<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Emerald Gradient -->
    <linearGradient id="emerald-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Accent Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <rect width="496" height="496" x="8" y="8" rx="120" fill="none" stroke="#1e293b" stroke-width="6" />

  <!-- Hand & Fingers (Representing Jaritmatika / Math Finggers) -->
  <g transform="translate(136, 110)">
    <!-- Palm base -->
    <path d="M40 180 C40 150, 70 140, 110 140 C150 140, 190 150, 190 190 C190 230, 170 260, 130 270 C90 280, 40 250, 40 180 Z" fill="url(#emerald-grad)" opacity="0.9" />
    
    <!-- Thumb (Jempol) - bent/active -->
    <path d="M45 155 Q10 140 20 110 Q30 80 55 110 C70 125, 60 145, 45 155 Z" fill="url(#emerald-grad)" filter="url(#glow)" />
    
    <!-- Index Finger (Telunjuk) - showing 1 -->
    <rect x="75" y="10" width="22" height="135" rx="11" fill="url(#emerald-grad)" filter="url(#glow)" />
    
    <!-- Middle Finger (Tengah) - showing 2 -->
    <rect x="107" y="0" width="22" height="145" rx="11" fill="url(#emerald-grad)" filter="url(#glow)" />
    
    <!-- Ring Finger (Manis) - folded -->
    <path d="M139 140 C139 120, 155 120, 155 140 L155 175 C155 185, 139 185, 139 175 Z" fill="#047857" />
    
    <!-- Pinky Finger (Kelingking) - folded -->
    <path d="M169 155 C169 140, 183 140, 183 155 L183 180 C183 190, 169 190, 169 180 Z" fill="#047857" />

    <!-- Wrist connection -->
    <path d="M70 245 L85 295 L155 295 L165 245 Z" fill="url(#emerald-grad)" opacity="0.75" />
  </g>

  <!-- Math Symbols surrounding the hand -->
  <!-- Plus symbol -->
  <g transform="translate(90, 120)" stroke="#10b981" stroke-width="8" stroke-linecap="round">
    <line x1="0" y1="-15" x2="0" y2="15" />
    <line x1="-15" y1="0" x2="15" y2="0" />
  </g>

  <!-- Minus symbol -->
  <g transform="translate(410, 180)" stroke="#34d399" stroke-width="8" stroke-linecap="round">
    <line x1="-15" y1="0" x2="15" y2="0" />
  </g>

  <!-- Multiply symbol -->
  <g transform="translate(100, 320)" stroke="#34d399" stroke-width="6" stroke-linecap="round">
    <line x1="-10" y1="-10" x2="10" y2="10" />
    <line x1="10" y1="-10" x2="-10" y2="10" />
  </g>

  <!-- Equals symbol -->
  <g transform="translate(390, 300)" stroke="#10b981" stroke-width="8" stroke-linecap="round">
    <line x1="-15" y1="-6" x2="15" y2="-6" />
    <line x1="-15" y1="6" x2="15" y2="6" />
  </g>

  <!-- Number 5 glow representing the thumb value -->
  <text x="390" y="110" font-family="system-ui, sans-serif" font-weight="900" font-size="44" fill="#10b981" text-anchor="middle" filter="url(#glow)">5</text>
  
  <!-- Number 1 representing the fingers value -->
  <text x="130" y="80" font-family="system-ui, sans-serif" font-weight="900" font-size="32" fill="#34d399" text-anchor="middle" opacity="0.8">1</text>
</svg>
